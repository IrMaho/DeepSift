<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeepSift Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="logo">DeepSift</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="index.html#features">Features</a></li>
            <li><a href="login.html" class="btn-login" id="nav-login-btn">Login</a></li>
        </ul>
    </nav>
    <main class="login-container">
        <div class="login-card">
            <h2>Welcome Back</h2>
            <p>Access your workspace configuration</p>
            <form id="login-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" required placeholder="name@company.com">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn-submit">Sign In</button>
                <div class="error-message" id="error-box">Invalid credentials. Please try again.</div>
            </form>
        </div>
    </main>
    <script src="app.js"></script>
</body>
</html>
